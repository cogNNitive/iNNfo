      - paragraph [ref=e94]:
        - text: You just opened a
        - strong [ref=e95]: FORMAT document
        - text: — and it probably looks like a wall of text with symbols, dashes, and tables. That's normal. FORMAT documents are plain Markdown files that carry their own schema, designed to be both human-readable and machine-processable.
      - paragraph [ref=e96]: This guide is for first-time users who want to understand what's going on and how to work with these files visually.
      - blockquote [ref=e97]:
        - paragraph [ref=e98]:
          - strong [ref=e99]: 👁️ This page itself is a raw Markdown file.
          - text: What you're reading — headings, text, code blocks — is rendered by Docsify directly from a
          - code [ref=e100]: .md
          - text: "file. A FORMAT document is the same: plain Markdown. But when you load it in the FORMAT app, that same raw text becomes an interactive dashboard with editable cards, scored matrices, and navigable concept trees. Keep scrolling to see the side-by-side comparison."
      - separator [ref=e101]
