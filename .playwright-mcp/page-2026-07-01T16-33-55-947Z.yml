      - paragraph [ref=e104]:
        - text: A FORMAT document is a structured Markdown file that represents a
        - strong [ref=e105]: business or procedure model
        - text: . Everything — the schema, the data, the relationships — lives in a single
        - code [ref=e106]: .md
        - text: "file:"
