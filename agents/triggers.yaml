# Skill Triggers Registry
# Data-driven registry: the agent reads this to discover which skills match
# the user's message. No skill names are hardcoded in system prompts.
#
# Scope legend:
#   global  — C:\Users\lucas\.config\opencode\skills\
#   user    — C:\Users\lucas\.agents\skills\
#   project — {project}\.agents\skills\
#
# To add a new skill: add an entry here. That's it. No code changes.

